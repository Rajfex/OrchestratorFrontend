<div class="w-full max-w-3xl bg-white shadow-lg rounded-lg p-6 mx-auto mt-10">
  <h1 class="text-2xl font-semibold mb-4 text-gray-800">Add Elements</h1>

  <div class="mb-6">
    <nav class="flex space-x-2">
      <button class="px-4 py-2 rounded-md transition-colors font-bold" [ngClass]="activeTab === 'flash' ? 'bg-slate-900 text-white' : 'bg-white-200 text-gray-700 hover:bg-gray-300'"  (click)="toggleFlashscore()">Flashscore</button>
      <button class="px-4 py-2 rounded-md transition-colors font-bold" [ngClass]="activeTab === 'stocks' ? 'bg-slate-900 text-white' : 'bg-white-200 text-gray-700 hover:bg-gray-300'" (click)="toggleStocks()">Stocks</button>
    </nav>
  </div>

  <div *ngIf="activeTab === 'flash'" class="space-y-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="md:col-span-2">
        <label class="block text-sm font-medium text-gray-700">Name</label>
        <input type="text" [(ngModel)]="fsName" class="mt-1 block w-full rounded-md border border-gray-300 p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Country</label>
        <input type="text" [(ngModel)]="fsCountry" class="mt-1 block w-full rounded-md border border-gray-300 p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">League Name</label>
        <input type="text" [(ngModel)]="fsLeague" class="mt-1 block w-full rounded-md border border-gray-300 p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500" />
      </div>
    </div>
    <div class="flex space-x-2">
      <button class="px-4 py-2 rounded-md font-semibold border border-gray-300 text-gray-700 bg-white hover:bg-gray-100 transition-colors" (click)="addFlash()">Add to list</button>
      <button class="px-4 py-2 rounded-md font-semibold bg-slate-900 text-white hover:bg-slate-800 transition-colors" (click)="submitFlash()">Submit</button>
    </div>
  </div>

  <div *ngIf="activeTab === 'stocks'" class="space-y-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="md:col-span-2">
        <label class="block text-sm font-medium text-gray-700">Task name</label>
        <input [(ngModel)]="stTaskName" class="mt-1 block w-full rounded-md border border-gray-300 p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Type</label>
        <select [(ngModel)]="stType" class="mt-1 block w-full rounded-md border border-gray-300 p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500">
          <option value="Akcje">Akcje</option>
          <option value="Indeksy">Indeksy</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Period</label>
        <input type="text" [(ngModel)]="stPeriod" class="mt-1 block w-full rounded-md border border-gray-300 p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500"/>
      </div>
      <div class="md:col-span-2">
        <label class="block text-sm font-medium text-gray-700">Name</label>
        <input type="text" [(ngModel)]="stName" class="mt-1 block w-full rounded-md border border-gray-300 p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500" />
      </div>
    </div>
    <div class="flex space-x-2">
      <button class="px-4 py-2 rounded-md font-semibold border border-gray-300 text-gray-700 bg-white hover:bg-gray-100 transition-colors" (click)="addStock()">Add to list</button>
      <button class="px-4 py-2 rounded-md font-semibold bg-slate-900 text-white hover:bg-slate-800 transition-colors" (click)="submitStocks()">Submit</button>
    </div>
  </div>

  <div class="mt-8 border-t pt-6">
    <h2 class="text-lg font-medium mb-3 text-gray-700">Added Elements</h2>
    <div class="space-y-2">
      <div *ngIf="activeTab === 'flash'">
        <div *ngFor="let item of flashscoreList" class="p-2 bg-gray-50 border border-gray-200 rounded-md">
          <span class="font-bold text-blue-600">{{ item.country }}</span> - {{ item.leagueName }}
        </div>
      </div>
      
      <div *ngIf="activeTab === 'stocks'">
        <div *ngFor="let item of stocksList" class="p-2 bg-gray-50 border border-gray-200 rounded-md">
          <span class="font-bold text-green-600">{{ item.type }}</span> | {{ item.period }} | {{ item.name }}
        </div>
      </div>
    </div>
  </div>
</div>
