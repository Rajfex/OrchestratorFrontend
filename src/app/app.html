<div class="min-h-dvh bg-slate-100 text-slate-800">
  <nav class="flex items-center justify-between bg-slate-900 px-6 py-4 text-white">
    <div>
        <h1 class="m-0 text-lg font-semibold">Robot Orchestrator</h1>
        <a routerLink="/robots" class="hover:text-indigo-300 transition m-5">Robots</a>
        <a routerLink="/tasks" class="hover:text-indigo-300 transition m-5">Tasks</a>
        <a routerLink="/addTask" class="hover:text-indigo-300 transition m-5">Add Task</a>
        <a routerLink="/logs" class="hover:text-indigo-300 transition m-5">Logs</a>
    </div>

    <div>
    @if (isAuthenticated()) {
      <button
        type="button"
        class="rounded-md bg-blue-600 px-3 py-2 text-sm font-medium text-white transition hover:bg-blue-700"
        (click)="onLogout()"
      >
        Logout
      </button>
    } @else {
      <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="flex items-center gap-2">
        <input
          type="text"
          formControlName="name"
          placeholder="Name"
          autocomplete="username"
          class="rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
        />
        <input
          type="password"
          formControlName="password"
          placeholder="Password"
          autocomplete="current-password"
          class="rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
        />
        <button
          type="submit"
          class="rounded-md bg-blue-600 px-3 py-2 text-sm font-medium text-white transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-70"
        >
          Login
        </button>
        <a
          routerLink="/register"
          class="rounded-md bg-blue-600 px-3 py-2 text-sm font-medium text-white transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-70"
        >
          Register
        </a>
      </form>
    }
    </div>
  </nav>

  <main class="px-6 py-5">
    @if (errorMessage()) {
      <p class="mb-3 rounded-md bg-red-100 px-3 py-2 text-sm text-red-700">{{ errorMessage() }}</p>
    }
    <router-outlet />
  </main>
</div>
