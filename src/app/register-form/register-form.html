<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-bold text-center mb-6">
      Create account
    </h2>
    <form (ngSubmit)="register()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">
          Username
        </label>

        <input type="text" name="name" [(ngModel)]="name" required class="mt-1 w-full border px-4 py-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"/>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">
          Password
        </label>

        <input type="password" name="password" [(ngModel)]="password" required class="mt-1 w-full border px-4 py-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"/>
      </div>

      <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
        Register
      </button>
    </form>
  </div>
</div>
